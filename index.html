const { useState, useEffect, useCallback, useContext, createContext, useRef } = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CONFIG = {
  apiKey:      () => window.__PROFBEE_KEY__ || '',
  apiUrl:      'https://api.openai.com/v1/chat/completions',
  model:       window.__PROFBEE_MODEL__ || 'gpt-5.4-nano',
  maxTokens:   1000,
  temperature: 0.9,
  reasoningEffort: 'medium',
  exemplarsInjectedPerCall:      3,
  antiExemplarsInjectedPerCall:  2,
  exemplarThreshold:             4.0,
  antiExemplarThreshold:         2.0,
  singleDimensionExemplarScore:  5,
};

// ─── Supabase client ──────────────────────────────────────────────────────────
const supabase = window.supabase.createClient(
  window.__SUPABASE_URL__ || '',
  window.__SUPABASE_ANON_KEY__ || ''
);

// ─── Async kv_store adapter (rules, version log) ──────────────────────────────
const storage = {
  get: async (key) => {
    const { data } = await supabase.from('kv_store').select('value').eq('key', key).single();
    return data ? JSON.parse(data.value) : null;
  },
  set: async (key, value) => {
    await supabase.from('kv_store').upsert({ key, value: JSON.stringify(value) });
  },
};

// ─── Anonymous user helpers ───────────────────────────────────────────────────
async function getOrCreateUser() {
  let userId = localStorage.getItem('profbee_user_id');
  if (userId) return userId;
  const nickname = 'guest_' + Math.random().toString(36).slice(2, 7);
  const { data } = await supabase.from('users')
    .insert({ nickname, role: 'anonymous', vote_weight: 0.5 })
    .select('id').single();
  if (data && data.id) {
    localStorage.setItem('profbee_user_id', data.id);
    return data.id;
  }
  const fallback = 'local_' + Math.random().toString(36).slice(2, 10);
  localStorage.setItem('profbee_user_id', fallback);
  return fallback;
}

async function getUserRole(userId) {
  const { data } = await supabase.from('users').select('role').eq('id', userId).single();
  return data?.role || 'anonymous';
}

// ─── Supabase exemplar queries ────────────────────────────────────────────────
async function getTopExemplars(brand, task, focusDimension = null, limit = 3) {
  const orderCol = focusDimension ? `score_${focusDimension}` : 'weighted_overall';
  const { data } = await supabase.from('exemplars')
    .select('id,brief,output,weighted_overall,score_hook,score_specificity,score_voice_fit,score_tension,score_originality,notes')
    .eq('brand', brand).eq('task_type', task)
    .order(orderCol, { ascending: false })
    .limit(limit);
  return data || [];
}

async function getTopAntiExemplars(brand, task, focusDimension = null, limit = 2) {
  const orderCol = focusDimension ? `score_${focusDimension}` : 'weighted_overall';
  const { data } = await supabase.from('anti_exemplars')
    .select('id,brief,output,weighted_overall,worst_dimension,score_hook,score_specificity,score_voice_fit,score_tension,score_originality,why_bad')
    .eq('brand', brand).eq('task_type', task)
    .order(orderCol, { ascending: true })
    .limit(limit);
  return data || [];
}

// ─── Rules from Supabase ──────────────────────────────────────────────────────
async function getAlwaysRules() {
  const { data } = await supabase.from('rules').select('*').eq('scope','always').eq('active',true);
  return data || [];
}
async function getTaskRules(task) {
  const { data } = await supabase.from('rules').select('*').eq('scope','task').eq('task_type',task).eq('active',true);
  return data || [];
}

// ─── Corrections from kv_store ────────────────────────────────────────────────
async function getCorrections(brand, task) {
  return (await storage.get(`corrections:${brand}:${task}`)) || [];
}
async function setCorrections(brand, task, arr) {
  await storage.set(`corrections:${brand}:${task}`, arr);
}
async function getVersionLog() {
  return (await storage.get('system_prompt:version_log')) || [];
}
async function setVersionLog(arr) {
  await storage.set('system_prompt:version_log', arr);
}

// ─── Constants ────────────────────────────────────────────────────────────────
const BRANDS = [
  { id: 'profbee', label: 'Professor Bee', short: 'Prof Bee', sub: 'educator · trust' },
  { id: 'wnr',     label: 'Walden & Rooz', short: 'WnR',      sub: 'craft · sensory' },
  { id: 'nctr',    label: 'NCTR',          short: 'NCTR',      sub: 'everyday · scale' },
];
const TASKS = [
  { id: 'ig_caption',     label: 'IG Caption' },
  { id: 'tiktok_caption', label: 'TikTok Caption' },
  { id: 'ad_copy',        label: 'Ad Copy' },
  { id: 'video_script',   label: 'Video Script' },
  { id: 'product_desc',   label: 'Product Desc' },
  { id: 'email',          label: 'Email' },
];
const TL = Object.fromEntries(TASKS.map(t => [t.id, t.label]));
const BL = Object.fromEntries(BRANDS.map(b => [b.id, b.label]));

const DIMENSIONS = [
  { id: 'hook',        label: 'Hook',        desc: 'Does line 1 stop the scroll?' },
  { id: 'specificity', label: 'Specificity', desc: 'Concrete detail vs vague claim' },
  { id: 'voice_fit',   label: 'Voice Fit',   desc: 'Unmistakably this brand, not another' },
  { id: 'tension',     label: 'Tension',     desc: 'Creates a gap the reader needs to close' },
  { id: 'originality', label: 'Originality', desc: 'Sounds human, not generic AI copy' },
];

// ─── Base system prompt ───────────────────────────────────────────────────────
const BASE_PROMPT = `You are a copywriting agent for Prof Bee Holding, an Indonesian honey company operating three distinct brands. You write copy that is precise, specific, and commercially grounded. You never write generic health claims without support. You never blend brand voices. You do not use filler enthusiasm.

---

BRAND CONTEXT

PROFESSOR BEE
Role: Category educator and trust layer. Decodes honey for the urban educated class.
Tone: Scientific, clear, confident without chest-thumping. Like a careful teacher, not an angry whistleblower. The word "decode" is central to this brand.
Content jobs: category decoding, myth busting, sensory education, sourcing transparency, consumer literacy, industry reform framing.
What to avoid: cheap promotional behavior, overselling, jargon overload, preachy tone.

WALDEN & ROOZ (WnR)
Role: Premium craft honey brand. Turns honey into a refined, sensory, giftable experience.
Tone: Calm, assured, tasteful, reverent, quiet status. Like how someone talks about fine wine or single-origin coffee, not how they sell supplements.
Content jobs: sensory storytelling (aroma, nectar source, color, mouthfeel, finish), provenance and place, batch individuality, ritual and use context, packaging as object, craft legitimacy.
Hard constraints: NEVER blend voices with NCTR. NEVER make health claims without support. WnR honey is strictly single-origin, never blended. Do not imply otherwise.
Variants: Acacia, Mango, Rambutan, Signature. Each has distinct flavor profile.
Price range: 220,000-450,000 IDR per jar. Target: discerning Jakarta buyers, gifting.
What to avoid: mass-market tone, discount energy, generic health cliches, loud CTAs.

NCTR
Role: Everyday mass-market honey platform. Useful, practical, scalable.
Tone: Simple, energetic, useful. The buyer should think: "This fits my life."
Content jobs: use-case education, problem-solution framing, before-after narratives, habit formation, family relevance, practical offers, social proof from everyday users.
Channels: TikTok-first for content, marketplaces (Tokopedia/Shopee), affiliates.
Price range: 110,000-140,000 IDR per jar.
Segments: Active/runners, cooking/F&B, daily households, moms, youth.
What to avoid: vague lofty language, over-aesthetic content, WnR tone.

---

BRAND DISTINCTION TEST
If the copy could belong to any of the three brands, it has failed.
Each piece of copy must be answerable: which brand customer question does this answer?
- Professor Bee answers: "Can I trust what I am being told about honey?"
- WnR answers: "What does excellent honey look and feel like?"
- NCTR answers: "How does honey help me in real daily life?"

---

INDONESIAN MARKET GROUND TRUTH
- Indonesian consumers do not gather organically. They require deliberate shepherding.
- Cheap-feeling campaigns are ignored regardless of message quality.
- Being "part of something" must feel costly and exclusive to be valued (WnR).
- Generic health claims are tuned out. Specific sensory and use-case claims land.
- The core WnR consumer insight: "aku baru tau madu ada rasanya" -- provocation-first, not education-first. Make people feel they have been missing something.

---

PLATFORM NOTES
- WnR is IG-first. Copy should suit static image captions: atmosphere over urgency.
- NCTR is TikTok-first. Copy should hook in the first line. Energy, not elegance.
- IG captions and TikTok captions are different tasks. Do not write one as the other.

---

OUTPUT FORMAT
Return only the requested copy. No preamble, no explanation, no meta-commentary.
If you need to ask a clarifying question, ask it before writing, not after.
Write in the language specified in the brief (default: Indonesian unless stated otherwise).`;

// ─── Assemble system prompt (async) ──────────────────────────────────────────
async function assemblePrompt(brand, task, focusDimension = null) {
  let p = BASE_PROMPT;

  const [ar, tr, ex, anti] = await Promise.all([
    getAlwaysRules(),
    getTaskRules(task),
    getTopExemplars(brand, task, focusDimension, CONFIG.exemplarsInjectedPerCall),
    getTopAntiExemplars(brand, task, focusDimension, CONFIG.antiExemplarsInjectedPerCall),
  ]);

  if (ar.length) { p += '\n\n---\n\nHARD RULES (always apply):\n'; ar.forEach(r => p += `- ${r.text}\n`); }
  if (tr.length) { p += `\n\nRULES FOR THIS TASK TYPE (${TL[task]}):\n`; tr.forEach(r => p += `- ${r.text}\n`); }

  if (ex.length) {
    p += `\n\nEXEMPLARS FOR THIS BRAND + TASK (match this quality):\n`;
    ex.forEach((e, i) => {
      const scoreStr = e.weighted_overall != null ? `overall: ${parseFloat(e.weighted_overall).toFixed(1)}/5` : '';
      p += `\nExemplar ${i+1} [${scoreStr}]:\nBrief: ${e.brief}\nOutput: ${e.output}\n`;
    });
  }

  if (anti.length) {
    p += `\n\nANTI-EXEMPLARS — DO NOT WRITE LIKE THIS:\nThese are real outputs rated as failures. Study what makes them weak.\nDo not replicate their patterns, structure, phrasing, or failure modes.\n`;
    anti.forEach((e, i) => {
      const worstStr = e.worst_dimension ? `, worst dimension: ${e.worst_dimension}` : '';
      const whyStr = e.why_bad && e.why_bad.trim() ? e.why_bad : 'Rated low across multiple dimensions.';
      p += `\nAnti-Exemplar ${i+1} [overall: ${e.weighted_overall != null ? parseFloat(e.weighted_overall).toFixed(1) : '?'}/5${worstStr}]:\nBrief: ${e.brief}\nOutput: ${e.output}\nWhy it failed: ${whyStr}\n`;
    });
  }

  if (focusDimension) {
    const dim = DIMENSIONS.find(d => d.id === focusDimension);
    if (dim) {
      p += `\n\nDIMENSION FOCUS — THIS GENERATION ONLY\nYour primary goal is to maximize: ${dim.label}\nDefinition: ${dim.desc}\n\nStudy these exemplars specifically for their ${dim.label} quality.\n\nAll other dimensions still matter. But if you must trade off, prioritize ${dim.label}.\nDo not mention this focus in your output. Just write.`;
    }
  }

  return p;
}

// ─── OpenAI API call ──────────────────────────────────────────────────────────
async function callOpenAI(systemPrompt, userBrief) {
  const apiKey = CONFIG.apiKey();
  if (!apiKey) throw new Error('API key not configured. See window.__PROFBEE_KEY__ in index.html.');
  const body = {
    model: CONFIG.model,
    max_completion_tokens: CONFIG.maxTokens,
    temperature: CONFIG.temperature,
    messages: [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userBrief }
    ]
  };
  if (CONFIG.model.startsWith('o1') || CONFIG.model.startsWith('o3')) {
    body.reasoning_effort = CONFIG.reasoningEffort;
  }
  const response = await fetch(CONFIG.apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify(body)
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }
  const data = await response.json();
  return data.choices[0].message.content;
}

// ─── Shared UI ────────────────────────────────────────────────────────────────
function Btn({ onClick, children, variant='primary', className='', disabled=false, small=false }) {

  const v = {
    primary: 'bg-amber-700 border-amber-600 text-amber-50 hover:bg-amber-600',
    ghost:   'bg-transparent border-stone-600 text-stone-300 hover:border-stone-400 hover:text-stone-100',
    danger:  'bg-transparent border-red-800 text-red-400 hover:bg-red-900 hover:text-red-200',
    amber:   'bg-transparent border-amber-700 text-amber-500 hover:bg-amber-900 hover:text-amber-300',
    green:   'bg-transparent border-green-800 text-green-400 hover:bg-green-900 hover:text-green-200',
  };
  return <button onClick={disabled ? undefined : onClick} className={`${base} ${v[variant] || v.primary} ${className}`} disabled={disabled}>{children}</button>;
}
function Card({ children, className='' }) {
  return <div className={`border border-stone-700 bg-stone-900 p-4 ${className}`}>{children}</div>;
}
function Lbl({ children }) {
  return <label className="block text-xs font-medium text-stone-400 mb-1 uppercase tracking-wide">{children}</label>;
}
function TA({ value, onChange, placeholder, rows=4, mono=false, readOnly=false }) {
  return <textarea value={value} onChange={e => !readOnly && onChange(e.target.value)} placeholder={placeholder} rows={rows} readOnly={readOnly}
    className={`w-full bg-stone-800 border border-stone-600 text-stone-100 px-3 py-2 text-sm placeholder-stone-500 focus:border-amber-700 ${mono ? 'mono' : ''} ${readOnly ? 'opacity-60 cursor-not-allowed' : ''}`} />;
}
function Stars({ rating, onRate, size='text-4xl' }) {
  const [h, setH] = useState(0);
  return (
    <div className="flex gap-1" onMouseLeave={() => setH(0)}>
      {[1,2,3,4,5].map(n => (
        <span key={n} className={`${size} select-none cursor-pointer transition-colors`}
          style={{ color: n <= (h || rating) ? '#c8860a' : '#3a3028' }}
          onMouseEnter={() => setH(n)} onClick={() => onRate(n)}>★</span>
      ))}
    </div>
  );
}
function TagBrand({ brand }) {
  const c = { profbee: 'text-green-400 border-green-800', wnr: 'text-purple-300 border-purple-800', nctr: 'text-amber-400 border-amber-800' };
  return <span className={`text-xs border px-2 py-0.5 mono ${c[brand] || 'text-stone-400 border-stone-700'}`}>{BL[brand] || brand}</span>;
}
function TagTask({ task }) {

}
function BrandSelector({ value, onChange }) {

function TaskSelector({ value, onChange }) {

      {TASKS.map(t => (

// ─── DimensionRater ───────────────────────────────────────────────────────────
function DimensionRater({ scores, onChange, focusDimension = null }) {
  const ratedCount = DIMENSIONS.filter(d => scores[d.id] != null).length;
  return (
    <div className="flex flex-col gap-1">
      <div className="flex items-center justify-between mb-2">
        <p className="text-xs text-stone-500 uppercase tracking-widest">Rate this output</p>
        <span className="text-xs text-stone-600 mono">{ratedCount} of 5 rated</span>
      </div>
      {DIMENSIONS.map(dim => {
        const isFocus = focusDimension === dim.id;
        const starSize = isFocus ? 'text-3xl' : 'text-2xl';
        return (
          <div key={dim.id} className={`flex items-center gap-3 px-2 py-1.5 rounded transition-colors ${isFocus ? 'border border-amber-700 bg-amber-950' : 'border border-transparent'}`}>
            <div className="w-24 flex-shrink-0">
              <span className={`text-xs font-medium ${isFocus ? 'text-amber-400' : 'text-stone-300'}`}>
                {isFocus ? `FOCUS: ${dim.label}` : dim.label}
              </span>
            </div>
            <span className={`text-xs flex-1 ${isFocus ? 'text-stone-400' : 'text-stone-600'}`}>{dim.desc}</span>
            <Stars rating={scores[dim.id] || 0} onRate={(n) => onChange({ ...scores, [dim.id]: n })} size={starSize} />
          </div>
        );
      })}
    </div>
  );
}
